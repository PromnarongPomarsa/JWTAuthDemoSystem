<div class="min-h-screen bg-slate-100">
  <main class="flex min-h-[calc(100vh-88px)] items-center justify-center px-4 py-10">
    <div class="w-full max-w-md rounded-2xl bg-white p-6 shadow-xl sm:p-8">
      <form class="space-y-6">
        <div>
          <label for="username" class="mb-2 block text-lg font-medium text-slate-800">
            User
          </label>
          <input id="username" type="text" pInputText [(ngModel)]="username" name="username" autocomplete="username"
            class="w-full !bg-white !text-slate-900 !border !border-slate-400 !shadow-none" />
        </div>

        <div>
          <label for="password" class="mb-2 block text-lg font-medium text-slate-800">
            Password
          </label>
          <p-password inputId="password" [(ngModel)]="password" name="password" [feedback]="false" [toggleMask]="true"
            autocomplete="current-password" styleClass="w-full"
            inputStyleClass="w-full !bg-white !text-slate-900 !border !border-slate-400 !shadow-none">
          </p-password>
        </div>

        <div>
          <label for="password" class="mb-2 block text-lg font-medium text-slate-800">
            Comfirm Password
          </label>
          <p-password inputId="password" [(ngModel)]="comfirm_password" name="comfirm_password" [feedback]="false"
            [toggleMask]="true" autocomplete="current-password" styleClass="w-full"
            inputStyleClass="w-full !bg-white !text-slate-900 !border !border-slate-400 !shadow-none">
          </p-password>
        </div>

        <p-button label="สมัครสมาชิก" styleClass="w-full mb-2">
        </p-button>
      </form>
    </div>
  </main>
</div>
